<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador METAR</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 10px; margin: 0; }
        .container { display: flex; flex-direction: column; gap: 10px; }
        .input-group { display: flex; gap: 5px; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #334155; background: #1e293b; color: white; width: 100px; text-transform: uppercase; }
        button { padding: 10px; border-radius: 5px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; }
        #metar-box { background: #1e293b; padding: 15px; border-radius: 10px; border: 1px solid #334155; font-size: 0.9rem; word-wrap: break-word; }
    </style>
</head>
<body>
    <div class="container">
        <div class="input-group">
            <input type="text" id="icao-input" placeholder="ICAO (ej. SKBO)" maxlength="4">
            <button onclick="updateMetar()">Buscar</button>
        </div>
        <div id="metar-box">Ingresa un ICAO para ver el METAR.</div>
    </div>

    <script>
        // Tu token integrado
        const token = 'vP8ktG3qcKBYNhI3TBImWKuS23ylmW1kuJ2qJg4a4dQ';
        
        async function updateMetar() {
            const icao = document.getElementById('icao-input').value.toUpperCase();
            const box = document.getElementById('metar-box');
            
            if (icao.length < 4) {
                box.innerText = "Por favor ingresa un ICAO de 4 letras.";
                return;
            }
            
            box.innerText = "Consultando...";
            
            try {
                // AVWX utiliza este formato de consulta
                const response = await fetch(`https://avwx.rest/api/metar/${icao}?token=${token}`);
                const data = await response.json();
                
                if (data.raw) {
                    box.innerText = data.raw;
                } else {
                    box.innerText = "No se encontró información para este ICAO.";
                }
            } catch (error) {
                box.innerText = "Error de conexión. Intenta de nuevo";
            }
        }
    </script>
</body>
</html>
